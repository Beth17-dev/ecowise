<!DOCTYPE html>
<html>
<head>
  <title>EcoWise Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #3b6a8a;
    }

    header {
      background: #2ecc71;
      padding: 15px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: 90vh;
    }

    .sidebar {
      width: 250px;
      background: #0f6b5b;
      color: white;
      padding: 20px;
    }

    .sidebar select, .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 8px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    .actions {
      margin-top: 20px;
      text-align: center;
    }

    .actions button {
      margin: 10px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<header>EcoWise</header>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Maps</h3>
    <select>
        <option>Sankanan</option>
        <option>Tankulan</option>
        <option>Kihare</option>
        <option>Kalugmanan</option>
        <option>Lindaban</option>
        <option>Ticala</option>
    </select>

    <h3>Set Day</h3>
    <select>
      <option>Monday</option>
    </select>

    <h3>Target</h3>
    <select>
      <option>Recyclable</option>
    </select>

    <h3>Importance</h3>
    <select>
      <option>Priority</option>
    </select>

    <button>Add Task</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="main">
    <h2>List of Task</h2>

    <table>
      <thead>
        <tr>
          <th>Location</th>
          <th>Day</th>
          <th>Target</th>
          <th>Importance</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="taskTable">
        <!-- Data will go here -->
      </tbody>
    </table>

    <div class="actions">
      <button>Done</button>
      <button>Delete</button>
      <button>Move</button>
    </div>
  </div>

</div>

<script>
let currentUser = localStorage.getItem("currentUser");

if (!currentUser) {
  alert("Please login first!");
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}
</script>

</body>
</html>
